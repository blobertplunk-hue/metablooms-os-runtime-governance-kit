<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>MetaBlooms Student Activity</title><style>:root{--mb-color-bg:#f7f7fb;--mb-color-surface:#fff;--mb-color-text:#1f2937;--mb-color-focus:#111827;--mb-space-1:.5rem;--mb-radius-card:1rem;--mb-font-base:system-ui,sans-serif;--mb-touch-target-min:44px}body{font-family:var(--mb-font-base);background:var(--mb-color-bg);color:var(--mb-color-text)}.card{background:var(--mb-color-surface);border-radius:var(--mb-radius-card);padding:1rem}.choice{min-height:var(--mb-touch-target-min)}button:focus-visible{outline:3px solid var(--mb-color-focus)}@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}</style></head><body><main class="card"><h1>Student Activity</h1><button class="choice">Answer</button><section aria-live="polite" id="feedback">Feedback appears here.</section></main><script>function speakText(t){speechSynthesis.speak(new SpeechSynthesisUtterance(t));}</script></body></html>
