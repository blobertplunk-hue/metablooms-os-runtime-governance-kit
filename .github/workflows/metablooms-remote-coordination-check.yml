name: metablooms-remote-coordination-check

on:
  pull_request:
    paths:
      - 'coordination/**'
      - 'governance/sync/**'
      - 'recovery/**'
      - 'tools/metablooms/validate-remote-coordination.py'
      - '.github/workflows/metablooms-remote-coordination-check.yml'
  push:
    branches: [main]
    paths:
      - 'coordination/**'
      - 'governance/sync/**'
      - 'recovery/**'
      - 'tools/metablooms/validate-remote-coordination.py'
      - '.github/workflows/metablooms-remote-coordination-check.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  remote-coordination-scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate remote coordination scaffold
        run: python3 tools/metablooms/validate-remote-coordination.py
